<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dreamy Star Map ✨</title>

<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #000;
    color: white;
    overflow: hidden;
  }

  #sky {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .star:hover {
    transform: scale(2);
    box-shadow: 0 0 10px white, 0 0 25px #8ab4ff;
  }

  /* SHOOTING STAR (NO TRAIL) */
  .shooting-star {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 12px white, 0 0 25px #8ab4ff;
    pointer-events: none;
  }

  #popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 20, 50, 0.9);
    padding: 25px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 30px rgba(138, 180, 255, 0.6);
    display: none;
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  #close {
    margin-top: 15px;
    cursor: pointer;
    font-size: 12px;
    opacity: 0.7;
  }

  #close:hover { opacity: 1; }

  .diamond {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    transform: rotate(45deg);
    pointer-events: none;
    box-shadow: 0 0 8px white, 0 0 15px #8ab4ff;
    animation: fadeOut 0.7s forwards;
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: scale(0.5) rotate(45deg);
    }
  }
</style>
</head>

<body>

<div id="sky"></div>

<div id="popup">
  <h2 id="starName"></h2>
  <p id="starType"></p>
  <p id="starFact"></p>
  <div id="close" onclick="closePopup()">close ✧</div>
</div>

<script>

const sky = document.getElementById("sky");

/* STARS */
starsData.forEach((data, i) => {
  const star = document.createElement("div");
  star.classList.add("star");

  const size = Math.random() * 3 + 2;
  const colors = ["#ffffff","#cfd8ff","#ffd6ff","#fff4cc","#d0fbff"];

  star.style.width = size + "px";
  star.style.height = size + "px";
  star.style.background = colors[Math.floor(Math.random() * colors.length)];
  star.style.boxShadow = `0 0 ${size * 4}px white`;

  star.style.top = Math.random() * 100 + "vh";
  star.style.left = Math.random() * 100 + "vw";

  star.onclick = () => showStar(i);

  sky.appendChild(star);
});

/* ONE SHOOTING STAR */
let shootingActive = false;

function createShootingStar() {
  if (shootingActive) return;
  shootingActive = true;

  const star = document.createElement("div");
  star.classList.add("shooting-star");

  let x = -50;
  let y = Math.random() * window.innerHeight;
  const arc = (Math.random() * -0.3) - 0.1;

  sky.appendChild(star);

  function animate() {
    x += 10;
    y += arc * 10;

    star.style.left = x + "px";
    star.style.top = y + "px";

    if (x < window.innerWidth + 100) {
      requestAnimationFrame(animate);
    } else {
      star.remove();
      shootingActive = false;
    }
  }

  animate();
}

setInterval(() => {
  if (Math.random() > 0.5) createShootingStar();
}, 1200);

/* POPUP + CURSOR (unchanged) */
function showStar(index) {
  const star = starsData[index];
  document.getElementById("starName").innerText = star.name;
  document.getElementById("starType").innerText = star.type;
  document.getElementById("starFact").innerText = star.fact;
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

document.addEventListener("click", (e) => {
  const popup = document.getElementById("popup");
  if (popup.style.display === "block" && !popup.contains(e.target) && !e.target.classList.contains("star")) {
    closePopup();
  }
});

document.addEventListener("mousemove", (e) => {
  const d = document.createElement("div");
  d.classList.add("diamond");
  d.style.left = e.clientX + "px";
  d.style.top = e.clientY + "px";
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 700);
});
</script>

</body>
</html>
